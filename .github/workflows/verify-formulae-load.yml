name: Verify formulae load

# Validates that any Formula/*.rb changed by a pull request loads cleanly in
# Homebrew. `brew info` resolves each formula, which fails if (for example) a
# versioned formula's Ruby class name doesn't match its file name, or the file
# has a syntax error.
#
# This is the validity counterpart to `verify-formula-checksums.yml`: the
# checksum workflow downloads and verifies each `sha256` but never loads the
# formula through Homebrew, while this one loads the formula but does not check
# checksums. (`brew audit` is intentionally not used here -- it also flags
# pre-existing style nits, which would fail every PR.)

on:
  pull_request:
    paths:
      - "Formula/**.rb"

permissions:
  contents: read

concurrency:
  group: verify-formulae-load-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_ANALYTICS: "1"
  # Read formulae from the tapped checkout below, not the Homebrew JSON API.
  HOMEBREW_NO_INSTALL_FROM_API: "1"

jobs:
  verify-formulae-load:
    runs-on: macos-15-intel # Apple Silicon (arm64)
    steps:
      - name: Check out PR
        uses: actions/checkout@v4

      - name: Load changed formulae with brew info
        env:
          # Pass via env (not direct ${{ }} interpolation) so a crafted branch
          # name can't inject shell commands into the run script.
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail

          # Find the formulae changed by this PR (excluding deletions).
          git fetch --no-tags --depth=1 origin "$BASE_REF"
          git diff --name-only --diff-filter=d FETCH_HEAD HEAD -- 'Formula/*.rb' \
            > changed-formulae.txt

          if [ ! -s changed-formulae.txt ]; then
            echo "No formula changes to verify."
            exit 0
          fi

          echo "Changed formulae:"
          cat changed-formulae.txt

          # Expose the checked-out repo to Homebrew as the mongodb/brew tap so
          # brew loads the PR's formulae rather than the published tap.
          tap_dir="$(brew --repository)/Library/Taps/mongodb/homebrew-brew"
          mkdir -p "$(dirname "$tap_dir")"
          ln -sfn "$GITHUB_WORKSPACE" "$tap_dir"

          # bash 3.2 on macOS has no `mapfile`; read with a while loop.
          status=0
          while IFS= read -r file; do
            [ -n "$file" ] || continue
            name="$(basename "$file" .rb)"
            echo "::group::brew info mongodb/brew/${name}"
            if ! brew info --formula "mongodb/brew/${name}" >/dev/null; then
              echo "::error file=${file}::${name} failed to load (brew info)"
              status=1
            fi
            echo "::endgroup::"
          done < changed-formulae.txt

          exit "$status"
