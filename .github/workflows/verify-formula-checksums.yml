name: Verify formula checksums

# Validates every `url` / `sha256` pair in any Formula/*.rb file changed by a
# pull request: each archive is downloaded and its SHA-256 is recomputed and
# compared against the value pinned in the formula. This gates automated
# formula-bump PRs (e.g. from `mr homebrew release`) so a wrong or stale
# checksum can never be merged.

on:
  pull_request:
    paths:
      - "Formula/**.rb"

permissions:
  contents: read

concurrency:
  group: verify-formula-checksums-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify-checksums:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR
        uses: actions/checkout@v4

      - name: Verify checksums of changed formulae
        run: |
          set -euo pipefail

          # Fetch the PR base and diff against it to find changed formulae.
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          mapfile -t FILES < <(
            git diff --name-only --diff-filter=d FETCH_HEAD HEAD -- 'Formula/*.rb'
          )

          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No formula changes to verify."
            exit 0
          fi

          echo "Changed formulae:"
          printf '  %s\n' "${FILES[@]}"

          python3 - "${FILES[@]}" <<'PY'
          import hashlib
          import re
          import sys
          import urllib.request

          # Matches a `url "..."` line immediately followed by its
          # `sha256 "..."` line (the formula's pinned checksum).
          PAIR = re.compile(r'url\s+"([^"]+)"\s*\n\s*sha256\s+"([0-9a-f]{64})"')

          paths = [p for p in sys.argv[1:] if p]
          failures = []
          checked = 0

          for path in paths:
              with open(path) as f:
                  text = f.read()

              for url, expected in PAIR.findall(text):
                  checked += 1
                  print(f"verifying {url}")
                  digest = hashlib.sha256()
                  try:
                      with urllib.request.urlopen(url, timeout=300) as resp:
                          for chunk in iter(lambda: resp.read(1 << 20), b""):
                              digest.update(chunk)
                  except Exception as exc:  # noqa: BLE001 - report and continue
                      failures.append(f"{path}: {url}: download failed: {exc}")
                      continue

                  actual = digest.hexdigest()
                  if actual != expected:
                      failures.append(
                          f"{path}: {url}: sha256 mismatch "
                          f"(expected {expected}, got {actual})"
                      )
                  else:
                      print(f"  OK {actual}")

          print(f"\nchecked {checked} url/sha256 pair(s) across {len(paths)} file(s)")

          if failures:
              print("\nFAILURES:")
              for failure in failures:
                  print(f"  - {failure}")
              sys.exit(1)

          print("all checksums verified")
          PY
