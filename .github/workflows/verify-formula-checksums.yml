name: Verify formula checksums

# Validates the checksums of any Formula/*.rb changed by a pull request using
# Homebrew itself: `brew fetch` downloads each formula's artifact and verifies
# it against the pinned `sha256`. Because the formulae are arch-conditional
# (`if Hardware::CPU.intel? ... else ...`), each runner only sees its own arch's
# url/sha -- so we run on both an Intel and an Apple-Silicon macOS runner to
# cover x86_64 and arm64. This gates automated formula-bump PRs (e.g. from
# `mr homebrew release`) so a wrong or stale checksum can never be merged.

on:
  pull_request:
    paths:
      - "Formula/**.rb"

permissions:
  contents: read

concurrency:
  group: verify-formula-checksums-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  HOMEBREW_NO_AUTO_UPDATE: "1"
  # Read formulae from the tapped checkout below, not the Homebrew JSON API.
  HOMEBREW_NO_INSTALL_FROM_API: "1"

jobs:
  verify-checksums:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13 # Intel (x86_64)
            arch: x86_64
          - runner: macos-14 # Apple Silicon (arm64)
            arch: arm64
    runs-on: ${{ matrix.runner }}
    name: verify-checksums (${{ matrix.arch }})
    steps:
      - name: Check out PR
        uses: actions/checkout@v4

      - name: Verify changed formulae with brew fetch
        run: |
          set -euo pipefail

          # Find the formulae changed by this PR (excluding deletions).
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          git diff --name-only --diff-filter=d FETCH_HEAD HEAD -- 'Formula/*.rb' \
            > changed-formulae.txt

          if [ ! -s changed-formulae.txt ]; then
            echo "No formula changes to verify."
            exit 0
          fi

          echo "Changed formulae:"
          cat changed-formulae.txt

          # Expose the checked-out repo to Homebrew as the mongodb/brew tap so
          # brew reads the PR's formulae rather than the published tap.
          tap_dir="$(brew --repository)/Library/Taps/mongodb/homebrew-brew"
          mkdir -p "$(dirname "$tap_dir")"
          ln -sf "$GITHUB_WORKSPACE" "$tap_dir"

          # bash 3.2 on macOS has no `mapfile`; read the list with a while loop.
          status=0
          while IFS= read -r file; do
            [ -n "$file" ] || continue
            name="$(basename "$file" .rb)"
            echo "::group::brew fetch mongodb/brew/${name} (${{ matrix.arch }})"
            if ! brew fetch --retry --formula "mongodb/brew/${name}"; then
              echo "::error file=${file}::brew fetch failed for ${name} on ${{ matrix.arch }}"
              status=1
            fi
            echo "::endgroup::"
          done < changed-formulae.txt

          exit "$status"
